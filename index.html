<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MDPD // LIVE TRAFFIC FEED</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter+Tight:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<style>
  :root {
    --bg-primary: #0a0a0c;
    --bg-card: #111114;
    --bg-card-hover: #161619;
    --bg-elevated: #1a1a1e;
    --border: #222228;
    --border-accent: #2a2a32;
    --text-primary: #e8e8ec;
    --text-secondary: #8888a0;
    --text-muted: #55556a;
    --accent-red: #ff3b4f;
    --accent-orange: #ff8c38;
    --accent-yellow: #ffd23f;
    --accent-cyan: #3bfff0;
    --accent-blue: #3b8fff;
    --accent-green: #3bff8c;
    --glow-cyan: rgba(59, 255, 240, 0.08);
    --glow-red: rgba(255, 59, 79, 0.12);
    --font-display: 'Inter Tight', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── TOP ACCENT BAR ── */
  .top-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent-red) 0%, var(--accent-orange) 30%, var(--accent-yellow) 60%, var(--accent-cyan) 100%);
  }

  /* ── HEADER ── */
  .header {
    padding: 16px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    background: linear-gradient(135deg, rgba(255,59,79,0.07) 0%, rgba(59,143,255,0.04) 50%, rgba(59,255,240,0.03) 100%);
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,59,79,0.4) 0%, transparent 60%);
  }

  .header-left { display: flex; flex-direction: column; gap: 4px; }

  .header-tag {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-red);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-tag .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-red);
    animation: pulse-dot 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--accent-red); }
    50% { opacity: 0.4; box-shadow: 0 0 14px var(--accent-red); }
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff 0%, var(--accent-cyan) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .header-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .source-mode {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    margin-left: 6px;
  }

  .source-mode.live   { background: rgba(59,255,240,0.15); color: var(--accent-cyan);   border: 1px solid rgba(59,255,240,0.3);  }
  .source-mode.cached { background: rgba(255,210,63,0.12); color: var(--accent-yellow); border: 1px solid rgba(255,210,63,0.25); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .status-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .stat-pill.pill-active { background: rgba(59,255,240,0.08);  border: 1px solid rgba(59,255,240,0.25); }
  .stat-pill.pill-active .val   { color: var(--accent-cyan);   font-weight: 700; font-size: 13px; }
  .stat-pill.pill-active .label { color: rgba(59,255,240,0.6); }

  .stat-pill.pill-inj { background: rgba(255,140,56,0.08); border: 1px solid rgba(255,140,56,0.25); }
  .stat-pill.pill-inj .val   { color: var(--accent-orange);  font-weight: 700; font-size: 13px; }
  .stat-pill.pill-inj .label { color: rgba(255,140,56,0.6);  }

  .stat-pill.pill-hr { background: rgba(255,210,63,0.08); border: 1px solid rgba(255,210,63,0.2); }
  .stat-pill.pill-hr .val   { color: var(--accent-yellow);  font-weight: 700; font-size: 13px; }
  .stat-pill.pill-hr .label { color: rgba(255,210,63,0.6);  }

  .clock {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-cyan);
    font-variant-numeric: tabular-nums;
    opacity: 0.7;
  }

  /* ── MOBILE TABS ── */
  .mobile-tabs {
    display: none;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 11px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
  }

  .tab-btn.active {
    color: var(--accent-cyan);
    border-bottom-color: var(--accent-cyan);
    background: rgba(59,255,240,0.04);
  }

  /* ── LAYOUT ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 420px;
    height: calc(100vh - 88px);
  }

  /* ── MAP ── */
  .map-panel {
    position: relative;
    border-right: 1px solid var(--border);
  }

  #map { width: 100%; height: 100%; background: var(--bg-primary); }

  .leaflet-container { background: #0a0a0c !important; }

  .pulse-marker {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid;
    position: relative;
  }

  .pulse-marker::before {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid;
    opacity: 0;
    animation: ring-out 2.5s ease-out infinite;
  }

  @keyframes ring-out {
    0%   { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(2.6); opacity: 0; }
  }

  .m-accident::before { border-color: var(--accent-red);    }
  .m-injury::before   { border-color: var(--accent-orange);  }
  .m-hitrun::before   { border-color: var(--accent-yellow);  }
  .m-other::before    { border-color: var(--accent-blue);    }

  .m-accident { background: rgba(255,59,79,0.5);  border-color: var(--accent-red);    }
  .m-injury   { background: rgba(255,140,56,0.5); border-color: var(--accent-orange);  }
  .m-hitrun   { background: rgba(255,210,63,0.5); border-color: var(--accent-yellow);  }
  .m-other    { background: rgba(59,143,255,0.5); border-color: var(--accent-blue);    }

  .map-legend {
    position: absolute;
    bottom: 16px; left: 16px;
    z-index: 1000;
    background: rgba(10,10,12,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .legend-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 10px; color: var(--text-secondary);
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── FEED ── */
  .feed-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .feed-top {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(59,143,255,0.06) 0%, rgba(59,255,240,0.04) 100%);
  }

  .feed-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent-cyan);
    font-weight: 600;
    opacity: 0.8;
  }

  .btn-refresh {
    background: rgba(59,255,240,0.06);
    border: 1px solid rgba(59,255,240,0.2);
    color: var(--accent-cyan);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .btn-refresh:hover  { background: rgba(59,255,240,0.12); border-color: var(--accent-cyan); box-shadow: 0 0 12px var(--glow-cyan); }
  .btn-refresh:active { transform: scale(0.97); }
  .btn-refresh.busy   { opacity: 0.4; pointer-events: none; }

  /* ── HISTORY CHART ── */
  .history-bar {
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: rgba(8,8,10,0.7);
    overflow: hidden;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 20px;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }

  .history-header:hover { background: rgba(255,255,255,0.02); }

  .history-title {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 600;
  }

  .history-peak {
    font-size: 9px;
    color: var(--text-muted);
    opacity: 0.6;
    margin-left: auto;
    margin-right: 10px;
  }

  .history-toggle {
    font-size: 9px;
    color: var(--text-muted);
    transition: transform 0.2s;
    line-height: 1;
  }

  .history-bar.open .history-toggle { transform: rotate(180deg); }

  .history-body {
    display: none;
    padding: 2px 16px 10px;
  }

  .history-bar.open .history-body { display: block; }

  #historyCanvas { width: 100%; height: 60px; display: block; }

  /* ── FEED LIST ── */
  .feed-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-accent) transparent;
    -webkit-overflow-scrolling: touch;
  }

  .feed-list::-webkit-scrollbar { width: 4px; }
  .feed-list::-webkit-scrollbar-track { background: transparent; }
  .feed-list::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 4px; }

  /* ── CARDS ── */
  .card {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s, filter 0.2s;
    position: relative;
    animation: slideIn 0.35s ease-out both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 0 2px 2px 0;
  }

  .card.t-accident { background: rgba(255,59,79,0.03);  }
  .card.t-injury   { background: rgba(255,140,56,0.03); }
  .card.t-hitrun   { background: rgba(255,210,63,0.03); }
  .card.t-other    { background: rgba(59,143,255,0.02); }

  .card.t-accident::before { background: var(--accent-red);    }
  .card.t-injury::before   { background: var(--accent-orange);  }
  .card.t-hitrun::before   { background: var(--accent-yellow);  }
  .card.t-other::before    { background: var(--accent-blue);    }

  .card:hover    { filter: brightness(1.3); }
  .card.selected { filter: brightness(1.5); }

  /* Stale incidents (> 3h old) */
  .card.stale             { opacity: 0.35; filter: saturate(0.2); }
  .card.stale:hover       { opacity: 0.55; filter: saturate(0.4); }
  .card.stale.selected    { opacity: 0.75; filter: saturate(0.6); }

  .stale-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-left: 5px;
    opacity: 0.65;
  }

  .card-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
    gap: 8px;
  }

  .badge {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge.t-accident { background: rgba(255,59,79,0.15);  color: var(--accent-red);    border: 1px solid rgba(255,59,79,0.2);  }
  .badge.t-injury   { background: rgba(255,140,56,0.15); color: var(--accent-orange); border: 1px solid rgba(255,140,56,0.2); }
  .badge.t-hitrun   { background: rgba(255,210,63,0.15); color: var(--accent-yellow); border: 1px solid rgba(255,210,63,0.2); }
  .badge.t-other    { background: rgba(59,143,255,0.15); color: var(--accent-blue);   border: 1px solid rgba(59,143,255,0.2); }

  .card-time {
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card-addr {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 3px;
    line-height: 1.3;
  }

  /* Landmark row shown when Location field is present */
  .card-landmark {
    font-size: 10px;
    color: var(--accent-yellow);
    opacity: 0.8;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* ── NEW BADGE ── */
  .badge-new {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(59,255,240,0.15);
    color: var(--accent-cyan);
    border: 1px solid rgba(59,255,240,0.35);
    animation: new-flash 1s ease-out 3;
    vertical-align: middle;
    margin-left: 6px;
    flex-shrink: 0;
  }

  .badge-new::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-cyan);
    animation: pulse-dot 1s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes new-flash {
    0%, 100% { background: rgba(59,255,240,0.15); }
    50%       { background: rgba(59,255,240,0.32); box-shadow: 0 0 8px rgba(59,255,240,0.3); }
  }

  /* ── MAPS LINK ── */
  .maps-link {
    color: var(--accent-blue);
    text-decoration: none;
    font-size: 10px;
    opacity: 0.7;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .maps-link:hover { opacity: 1; text-decoration: underline; }

  /* ── CLUSTER OVERRIDES ── */
  .marker-cluster-small,
  .marker-cluster-medium,
  .marker-cluster-large {
    background-color: rgba(59,255,240,0.15) !important;
  }
  .marker-cluster-small div,
  .marker-cluster-medium div,
  .marker-cluster-large div {
    background-color: rgba(59,255,240,0.35) !important;
    color: var(--accent-cyan) !important;
    font-family: var(--font-mono) !important;
    font-weight: 700 !important;
    font-size: 11px !important;
  }

  /* ── POPUP ── */
  .leaflet-popup-content-wrapper {
    background: rgba(17,17,20,0.97) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
    color: var(--text-primary) !important;
  }

  .leaflet-popup-tip { background: rgba(17,17,20,0.97) !important; }

  .leaflet-popup-content {
    font-family: var(--font-mono) !important;
    font-size: 11px !important;
    line-height: 1.6 !important;
    margin: 10px 14px !important;
  }

  .pop-sig {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 3px;
  }

  .pop-addr {
    font-family: var(--font-display);
    font-size: 13px; font-weight: 600;
    margin-bottom: 3px;
  }

  .pop-landmark {
    font-size: 10px;
    color: var(--accent-yellow);
    margin-bottom: 4px;
    opacity: 0.85;
  }

  .pop-time { color: var(--text-muted); font-size: 10px; }

  /* Street View thumbnail container in popup */
  .popup-sv {
    margin: 7px -2px 5px;
    border-radius: 5px;
    overflow: hidden;
    background: var(--bg-elevated);
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .popup-sv img {
    width: 100%;
    height: auto;
    display: none; /* shown by onload */
    border-radius: 5px;
  }

  .popup-sv-loading {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 18px;
  }

  /* ── FOOTER ── */
  .feed-footer {
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    text-align: center;
    flex-shrink: 0;
    background: var(--bg-card);
  }

  .auto-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-left: 8px;
    color: var(--accent-cyan);
    opacity: 0.6;
  }

  .auto-badge::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent-cyan);
  }

  /* ── LOADING ── */
  .loader-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 200px; gap: 16px;
  }

  .spin-ring {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-cyan);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* ══════════════════════════════════════
     RESPONSIVE — TABLET (≤ 900px)
  ══════════════════════════════════════ */
  @media (max-width: 900px) {
    .main-grid {
      grid-template-columns: 1fr;
      height: calc(100vh - 136px);
    }

    .mobile-tabs { display: flex; }

    .map-panel  { height: 100%; display: none; }
    .feed-panel { display: none; height: 100%; }

    .map-panel.tab-active  { display: block; }
    .feed-panel.tab-active { display: flex; }

    .map-legend { bottom: 12px; left: 12px; padding: 8px 12px; }
  }

  /* ══════════════════════════════════════
     RESPONSIVE — PHONE (≤ 480px)
  ══════════════════════════════════════ */
  @media (max-width: 480px) {
    .header {
      padding: 12px 16px 10px;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .header-title { font-size: 20px; }

    .header-right {
      width: 100%;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
    }

    .status-bar { gap: 6px; }

    .stat-pill       { padding: 4px 9px; font-size: 10px; }
    .stat-pill .val  { font-size: 12px; }

    .clock { font-size: 11px; }

    .card      { padding: 12px 16px; }
    .card-addr { font-size: 13px; }
    .feed-top  { padding: 10px 16px; }

    .main-grid { height: calc(100vh - 158px); }

    .legend-row { font-size: 9px; }
  }
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="header">
  <div class="header-left">
    <div class="header-tag"><span class="dot"></span> LIVE FEED — MIAMI-DADE COUNTY</div>
    <div class="header-title">MDPD TRAFFIC INCIDENTS</div>
    <div class="header-sub">
      traffic.mdpd.com
      <span class="source-mode cached" id="sourceMode">CACHED</span>
    </div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="status-bar">
      <div class="stat-pill pill-active"><span class="label">ACTIVE</span><span class="val" id="sCount">—</span></div>
      <div class="stat-pill pill-inj"><span class="label">INJURIES</span><span class="val" id="sInj">—</span></div>
      <div class="stat-pill pill-hr"><span class="label">HIT&amp;RUN</span><span class="val" id="sHR">—</span></div>
    </div>
  </div>
</div>

<div class="mobile-tabs">
  <button class="tab-btn" id="tabMap" onclick="switchTab('map')">Map</button>
  <button class="tab-btn active" id="tabFeed" onclick="switchTab('feed')">Incident Feed</button>
</div>

<div class="main-grid">
  <div class="map-panel" id="mapPanel">
    <div id="map"></div>
    <div class="map-legend">
      <div class="legend-row"><div class="legend-dot" style="background:var(--accent-red)"></div>Traffic Accident</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--accent-orange)"></div>With Injuries</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--accent-yellow)"></div>Hit &amp; Run</div>
      <div class="legend-row"><div class="legend-dot" style="background:var(--accent-blue)"></div>Other</div>
    </div>
  </div>

  <div class="feed-panel tab-active" id="feedPanel">
    <div class="feed-top">
      <span class="feed-label">Incident Feed</span>
      <button class="btn-refresh" id="btnRefresh" onclick="loadData()">Refresh</button>
    </div>

    <!-- 24-hour activity chart (collapsed by default) -->
    <div class="history-bar" id="historyBar">
      <div class="history-header" onclick="toggleHistory()">
        <span class="history-title">24H Activity</span>
        <span class="history-peak" id="historyPeak"></span>
        <span class="history-toggle">▼</span>
      </div>
      <div class="history-body">
        <canvas id="historyCanvas"></canvas>
      </div>
    </div>

    <div class="feed-list" id="feedList">
      <div class="loader-wrap"><div class="spin-ring"></div><div class="loader-text">Connecting…</div></div>
    </div>
    <div class="feed-footer" id="footer">AWAITING DATA</div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// CONFIG
// To enable Street View thumbnails in map
// popups, add your Google Maps API key here.
// Requires "Street View Static API" enabled
// at console.cloud.google.com
// ══════════════════════════════════════
const GOOGLE_API_KEY = ''; // e.g. 'AIzaSy...'

const STALE_THRESHOLD_MS = 3 * 60 * 60 * 1000; // 3 hours

// ══════════════════════════════════════
// EMBEDDED FALLBACK — last server fetch
// ══════════════════════════════════════
const FALLBACK_DATA = [
  {"CreateTime":"2026-03-11T23:47:33","Signal":"TRAFFIC ACCIDENT","Address":"NW 2ND AVE / NW 175TH ST","Location":"","Grid":"0186","Longitude":-80.20506181,"Latitude":25.93521252},
  {"CreateTime":"2026-03-11T23:28:16","Signal":"TRAFFIC ACCIDENT","Address":"16601 NW 42ND AVE","Location":"","Grid":"0321","Longitude":-80.2683423,"Latitude":25.92487691},
  {"CreateTime":"2026-03-11T21:21:59","Signal":"HIT AND RUN","Address":"690 NE 159TH ST","Location":"OAK GROVE PK","Grid":"0335","Longitude":-80.18581768,"Latitude":25.91977603},
  {"CreateTime":"2026-03-11T21:04:05","Signal":"TRAFFIC ACCIDENT","Address":"SW 88TH ST / SW 132ND AVE","Location":"IFO TMOBILE P/LOT","Grid":"4823","Longitude":-80.40371758,"Latitude":25.68567778},
  {"CreateTime":"2026-03-11T19:57:47","Signal":"TRAFFIC ACCIDENT WITH INJURIES","Address":"CRANDON BLVD / OCEAN LANE DR","Location":"SHELL","Grid":"1560","Longitude":-80.16216719,"Latitude":25.69933104}
];

// ══════════════════════════════════════
// MOBILE TAB SWITCHER
// ══════════════════════════════════════
function switchTab(tab) {
  const mapPanel  = document.getElementById('mapPanel');
  const feedPanel = document.getElementById('feedPanel');
  const tabMap    = document.getElementById('tabMap');
  const tabFeed   = document.getElementById('tabFeed');

  if (tab === 'map') {
    mapPanel.classList.add('tab-active');
    feedPanel.classList.remove('tab-active');
    tabMap.classList.add('active');
    tabFeed.classList.remove('active');
    setTimeout(() => map.invalidateSize(), 50);
  } else {
    feedPanel.classList.add('tab-active');
    mapPanel.classList.remove('tab-active');
    tabFeed.classList.add('active');
    tabMap.classList.remove('active');
  }
}

// ══════════════════════════════════════
// MAP
// ══════════════════════════════════════
const map = L.map('map', {
  center: [25.78, -80.22],
  zoom: 11,
  zoomControl: false,
  attributionControl: false
});
L.control.zoom({ position: 'topright' }).addTo(map);

const tileSources = [
  'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png'
];

let tileIdx = 0;
function loadTiles(idx) {
  const layer = L.tileLayer(tileSources[idx], { maxZoom: 19, errorTileUrl: '' }).addTo(map);
  layer.on('tileerror', () => {
    if (tileIdx < tileSources.length - 1) {
      tileIdx++;
      map.removeLayer(layer);
      loadTiles(tileIdx);
    }
  });
  if (idx === tileSources.length - 1) {
    document.querySelector('.leaflet-tile-pane').style.filter =
      'invert(1) hue-rotate(180deg) brightness(0.7) contrast(1.2) saturate(0.3)';
  }
}
loadTiles(0);

let layerGroup = L.markerClusterGroup({
  showCoverageOnHover: false,
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  zoomToBoundsOnClick: true
}).addTo(map);
let markerRefs = [];
let isLive = false;
let seenKeys = new Set();

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function classify(sig) {
  const s = (sig || '').toUpperCase();
  if (s.includes('INJUR'))                     return 'injury';
  if (s.includes('HIT') && s.includes('RUN')) return 'hitrun';
  if (s.includes('ACCIDENT'))                  return 'accident';
  return 'other';
}

const COLORS = { accident: '#ff3b4f', injury: '#ff8c38', hitrun: '#ffd23f', other: '#3b8fff' };

function fmtTime(iso) {
  try { return new Date(iso).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }); }
  catch { return '—'; }
}

function ago(iso) {
  try {
    const m = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    return h + 'h ' + (m % 60) + 'm ago';
  } catch { return ''; }
}

function isStale(iso) {
  try { return (Date.now() - new Date(iso).getTime()) > STALE_THRESHOLD_MS; }
  catch { return false; }
}

// Minimal HTML escape to prevent XSS from API data
function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ══════════════════════════════════════
// HISTORY — localStorage accumulation
// Stores { "YYYY-MM-DDTHH": maxCount, ... }
// for the last 24 hours across sessions.
// ══════════════════════════════════════
const HISTORY_KEY = 'mdpd_history';
const HISTORY_HOURS = 12;

function saveHistory(count) {
  try {
    const history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}');
    const hourKey = new Date().toISOString().slice(0, 13);
    // Keep the highest count seen within each hour slot
    history[hourKey] = Math.max(history[hourKey] || 0, count);
    // Prune slots older than our display window
    const cutoff = new Date(Date.now() - HISTORY_HOURS * 3600000).toISOString().slice(0, 13);
    for (const k of Object.keys(history)) {
      if (k < cutoff) delete history[k];
    }
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch { /* localStorage unavailable */ }
}

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '{}'); }
  catch { return {}; }
}

function toggleHistory() {
  const bar = document.getElementById('historyBar');
  bar.classList.toggle('open');
  if (bar.classList.contains('open')) drawHistoryChart();
}

function drawHistoryChart() {
  const canvas = document.getElementById('historyCanvas');
  if (!canvas || canvas.offsetWidth === 0) return;

  const history = getHistory();
  const now = new Date();

  // Build hour buckets from oldest → newest
  const buckets = [];
  for (let i = HISTORY_HOURS - 1; i >= 0; i--) {
    const d      = new Date(now.getTime() - i * 3600000);
    const key    = d.toISOString().slice(0, 13);
    const label  = d.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
    buckets.push({ key, label, count: history[key] ?? null, isCurrent: i === 0 });
  }

  const maxCount = Math.max(1, ...buckets.map(b => b.count ?? 0));

  // Update the peak indicator in the collapsed header
  const peakEl = document.getElementById('historyPeak');
  if (peakEl) peakEl.textContent = 'peak: ' + maxCount;

  // DPI-aware canvas sizing
  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.offsetWidth;
  const h   = 60;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const labelH = 14;
  const chartH = h - labelH;
  const slotW  = w / buckets.length;
  const barW   = Math.max(2, slotW - 3);

  buckets.forEach((b, i) => {
    const x = i * slotW + (slotW - barW) / 2;

    if (b.count !== null && b.count > 0) {
      const barH = Math.max(3, (b.count / maxCount) * chartH);
      const y    = chartH - barH;

      // Interpolate colour: cyan (#3bfff0) → orange (#ff8c38) as count rises
      const ratio = b.count / maxCount;
      const r  = Math.round(59  + ratio * (255 - 59));
      const g  = Math.round(255 + ratio * (140 - 255));
      const bl = Math.round(240 + ratio * (56  - 240));
      ctx.fillStyle = `rgba(${r},${g},${bl},${b.isCurrent ? 0.9 : 0.6})`;

      if (ctx.roundRect) {
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH, [2, 2, 0, 0]);
        ctx.fill();
      } else {
        ctx.fillRect(x, y, barW, barH);
      }

      // Count label inside bar if there's room
      if (barH > 16) {
        ctx.fillStyle = 'rgba(255,255,255,0.75)';
        ctx.font = '600 8px JetBrains Mono, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(b.count, x + barW / 2, y + 3);
      }
    } else if (b.count === null) {
      // Gap — no data recorded for this slot
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + 0.5, 0.5, barW - 1, chartH - 1);
    }

    // Hour label — every other slot + always current
    if (i % 2 === 0 || b.isCurrent) {
      ctx.fillStyle = b.isCurrent ? 'rgba(59,255,240,0.75)' : 'rgba(85,85,106,0.6)';
      ctx.font = '500 7px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(b.label, x + barW / 2, h - 2);
    }
  });
}

// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
function incidentKey(item) {
  return item.CreateTime + '|' + item.Address;
}

function render(data, firstLoad) {
  // Stats
  document.getElementById('sCount').textContent = data.length;
  document.getElementById('sInj').textContent   = data.filter(d => classify(d.Signal) === 'injury').length;
  document.getElementById('sHR').textContent    = data.filter(d => classify(d.Signal) === 'hitrun').length;

  // Determine new keys (skip on first load to avoid false positives)
  const currentKeys = new Set(data.map(incidentKey));
  const newKeys     = firstLoad ? new Set() : new Set([...currentKeys].filter(k => !seenKeys.has(k)));
  seenKeys = currentKeys;

  const list = document.getElementById('feedList');
  list.innerHTML = '';
  markerRefs = [];

  data.forEach((item, i) => {
    const t       = classify(item.Signal);
    const stale   = isStale(item.CreateTime);
    const isNew   = newKeys.has(incidentKey(item));
    const mapsUrl = (item.Latitude && item.Longitude)
      ? 'https://maps.google.com/?q=' + item.Latitude + ',' + item.Longitude
      : null;

    // ── Card ──────────────────────────────
    const card = document.createElement('div');
    card.className = 'card t-' + t + (stale ? ' stale' : '');
    card.style.animationDelay = (i * 40) + 'ms';

    const newBit      = isNew        ? '<span class="badge-new">New</span>' : '';
    const staleBit    = stale        ? '<span class="stale-label">(3h+)</span>' : '';
    const landmarkBit = item.Location
      ? '<div class="card-landmark">📍 ' + esc(item.Location) + '</div>'
      : '';
    const gridBit  = item.Grid ? '<span>GRID ' + esc(item.Grid) + '</span>' : '';
    const mapsBit  = mapsUrl
      ? '<a class="maps-link" href="' + mapsUrl + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ Maps</a>'
      : '';

    card.innerHTML =
      '<div class="card-row">' +
        '<span class="badge t-' + t + '">' + esc(item.Signal || 'UNKNOWN') + newBit + '</span>' +
        '<span class="card-time">' + fmtTime(item.CreateTime) + staleBit + '</span>' +
      '</div>' +
      '<div class="card-addr">' + esc(item.Address || 'Unknown address') + '</div>' +
      landmarkBit +
      '<div class="card-meta"><span>' + ago(item.CreateTime) + '</span>' + gridBit + mapsBit + '</div>';

    card.onclick = () => {
      list.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      if (item.Latitude && item.Longitude) {
        const mk    = markerRefs[i];
        const doFly = () => {
          layerGroup.zoomToShowLayer(mk, () => {
            map.flyTo([item.Latitude, item.Longitude], 15, { duration: 0.7 });
            mk.openPopup();
          });
        };
        if (window.innerWidth <= 900) { switchTab('map'); setTimeout(doFly, 100); }
        else doFly();
      }
    };
    list.appendChild(card);

    // ── Map marker ────────────────────────
    if (item.Latitude && item.Longitude) {
      const icon = L.divIcon({
        className: '',
        html: '<div class="pulse-marker m-' + t + '"></div>',
        iconSize: [14, 14], iconAnchor: [7, 7]
      });

      // Street View thumbnail (only when API key is configured)
      const svHtml = GOOGLE_API_KEY
        ? '<div class="popup-sv">' +
            '<span class="popup-sv-loading">Loading view…</span>' +
            '<img src="https://maps.googleapis.com/maps/api/streetview' +
              '?size=260x110&location=' + item.Latitude + ',' + item.Longitude +
              '&fov=90&pitch=5&source=outdoor&key=' + GOOGLE_API_KEY + '"' +
              ' onload="this.style.display=\'block\';this.previousElementSibling.style.display=\'none\'"' +
              ' onerror="this.closest(\'.popup-sv\').style.display=\'none\'"' +
              ' alt="" />' +
          '</div>'
        : '';

      const landmarkPopup = item.Location
        ? '<div class="pop-landmark">📍 ' + esc(item.Location) + '</div>'
        : '';
      const mapsPopupLink = mapsUrl
        ? '<a class="maps-link" href="' + mapsUrl + '" target="_blank" rel="noopener" style="display:inline-block;margin-top:5px">↗ Open in Google Maps</a>'
        : '';

      const mk = L.marker([item.Latitude, item.Longitude], { icon })
        .bindPopup(
          '<div class="pop-sig" style="color:' + COLORS[t] + '">' + esc(item.Signal) + '</div>' +
          '<div class="pop-addr">' + esc(item.Address) + '</div>' +
          landmarkPopup +
          '<div class="pop-time">' + fmtTime(item.CreateTime) + ' · ' + ago(item.CreateTime) + ' · Grid ' + esc(item.Grid || '—') + '</div>' +
          svHtml +
          mapsPopupLink,
          { closeButton: false, maxWidth: GOOGLE_API_KEY ? 290 : 220 }
        );

      layerGroup.addLayer(mk);
      markerRefs[i] = mk;
    }
  });

  // Fit all markers in view
  const pts = data.filter(d => d.Latitude && d.Longitude).map(d => [d.Latitude, d.Longitude]);
  if (pts.length > 1) map.fitBounds(pts, { padding: [40, 40], maxZoom: 13 });
}

// ══════════════════════════════════════
// FETCH STRATEGY
// 1. Try /api/traffic (Vercel proxy)
// 2. Try direct MDPD API
// 3. Fall back to embedded data
// ══════════════════════════════════════
let isFirstLoad = true;
let nextRefreshAt = null;
let countdownInterval = null;

function startCountdown() {
  nextRefreshAt = Date.now() + 60000;
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    const sec    = Math.max(0, Math.round((nextRefreshAt - Date.now()) / 1000));
    const autoEl = document.querySelector('#footer .auto-badge');
    if (autoEl) autoEl.textContent = 'Next refresh in ' + sec + 's';
  }, 1000);
}

async function loadData() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('busy');
  btn.textContent = 'Loading…';
  layerGroup.clearLayers();

  let data   = null;
  let source = 'cached';

  try {
    const r = await fetch('/api/traffic', { signal: AbortSignal.timeout(5000) });
    if (r.ok) { data = await r.json(); if (Array.isArray(data) && data.length) source = 'live'; else data = null; }
  } catch {}

  if (!data) {
    try {
      const r = await fetch('https://traffic.mdpd.com/api/traffic', { signal: AbortSignal.timeout(5000) });
      if (r.ok) { data = await r.json(); if (Array.isArray(data) && data.length) source = 'live'; else data = null; }
    } catch {}
  }

  if (!data) { data = FALLBACK_DATA; source = 'cached'; }

  isLive = source === 'live';

  const badge = document.getElementById('sourceMode');
  badge.className   = 'source-mode ' + source;
  badge.textContent = source === 'live' ? 'LIVE' : 'CACHED';

  render(data, isFirstLoad);
  isFirstLoad = false;

  // Persist incident count for the history chart
  saveHistory(data.length);
  if (document.getElementById('historyBar').classList.contains('open')) drawHistoryChart();

  const ts = new Date().toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
  });
  const footer = document.getElementById('footer');
  footer.innerHTML =
    (source === 'live' ? 'LIVE UPDATED ' : 'CACHED · CHECKED ') + ts +
    '<span class="auto-badge">Next refresh in 60s</span>';

  startCountdown();

  btn.classList.remove('busy');
  btn.textContent = 'Refresh';
}

// ══════════════════════════════════════
// CLOCK
// ══════════════════════════════════════
function tick() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: 'America/New_York'
  }) + ' EST';
}
setInterval(tick, 1000);
tick();

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
